services:
  control-plane:
    image: agentfield/control-plane:latest
    ports:
      - "8080:8080"
    environment:
      - AGENTFIELD_HTTP_ADDR=0.0.0.0:8080
      - AGENTFIELD_STORAGE_MODE=local
    volumes:
      - agentfield-data:/data

  swe-agent:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        # Local agentfield SDK (sibling repo) installed over PyPI in the image.
        agentfield_sdk: ../agentfield/sdk/python
    env_file: .env
    # codex runtime needs user namespaces (unshare/bwrap) for shell-exec and
    # its workspace-write sandbox; Docker's default seccomp profile blocks them.
    # The build container is already externally sandboxed, so this is safe.
    # Harmless for claude_code; required when SWE_DEFAULT_RUNTIME=codex.
    security_opt:
      - seccomp:unconfined
    environment:
      - AGENTFIELD_SERVER=http://control-plane:8080
      - NODE_ID=swe-planner
      - PORT=8003
      - AGENT_CALLBACK_URL=http://swe-agent:8003
      # Runtime watchdog headroom; build() finalizes at its own budget first.
      - default_execution_timeout=${default_execution_timeout:-21600}
      - SWE_DEFAULT_RUNTIME=${SWE_DEFAULT_RUNTIME:-claude_code}
      - SWE_DEFAULT_MODEL=${SWE_DEFAULT_MODEL:-}
      - SWE_CODEX_AUTH_MODE=${SWE_CODEX_AUTH_MODE:-auto}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Reachable throwaway test DB for any issue whose deterministic check / verify
      # gate HARD-requires a database (REQUIRE_TEST_DB=1, or a test that errors on
      # connect instead of skipIf(!HAS_DB)). Without this, such gates can never go
      # green in a DB-less build container. The target repo's own test global-setup
      # migrates this blank DB, so it stays repo-agnostic; override the URL/creds via
      # .env for a repo that expects different ones.
      - DATABASE_URL_TEST=${DATABASE_URL_TEST:-postgres://cosmichr_user:password@build-db:5432/cosmichr_buildtest}
    ports:
      - "8003:8003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - workspaces:/workspaces
      - ${HOME}/.codex:/root/.codex
      # Go port: write target (host path lands output), + read-only references
      - /home/maceo/Dev/goEngineeringPlan:/workspaces/target
      - /home/maceo/Dev/SWE-AF:/workspaces/source-swe-af:ro
      - /home/maceo/Dev/agentfield:/workspaces/agentfield-ref:ro
    depends_on:
      control-plane:
        condition: service_started
      build-db:
        condition: service_healthy
    deploy:
      replicas: 1  # Scale with: docker compose up --scale swe-agent=3

  swe-fast:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        # Local agentfield SDK (sibling repo) installed over PyPI in the image.
        agentfield_sdk: ../agentfield/sdk/python
    command: ["python", "-m", "swe_af.fast"]
    env_file: .env
    environment:
      - AGENTFIELD_SERVER=http://control-plane:8080
      - NODE_ID=swe-fast
      - PORT=8004
      - AGENT_CALLBACK_URL=http://swe-fast:8004
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GH_TOKEN=${GH_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-}
      - SWE_DEFAULT_RUNTIME=${SWE_DEFAULT_RUNTIME:-claude_code}
      - SWE_DEFAULT_MODEL=${SWE_DEFAULT_MODEL:-}
      - SWE_CODEX_AUTH_MODE=${SWE_CODEX_AUTH_MODE:-auto}
      - DATABASE_URL_TEST=${DATABASE_URL_TEST:-postgres://cosmichr_user:password@build-db:5432/cosmichr_buildtest}
    ports:
      - "8004:8004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - workspaces:/workspaces
      - ${HOME}/.codex:/root/.codex
    depends_on:
      control-plane:
        condition: service_started
      build-db:
        condition: service_healthy

  # Generic throwaway Postgres for build-time DB-dependent checks (migrations, RLS,
  # integration tests). Ephemeral by design — data lives in the container layer and
  # is wiped on recreate; the target repo's test global-setup migrates + truncates it
  # each run. Creds default to cosmic-HR's; override BUILD_DB_* / DATABASE_URL_TEST in
  # .env for another target. NOTE: a single shared DB — run DB-dependent builds one at
  # a time (concurrent builds' global-setups would truncate each other). Per-build DBs
  # are a future enhancement.
  build-db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${BUILD_DB_USER:-cosmichr_user}
      - POSTGRES_PASSWORD=${BUILD_DB_PASSWORD:-password}
      - POSTGRES_DB=${BUILD_DB_NAME:-cosmichr_buildtest}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BUILD_DB_USER:-cosmichr_user} -d ${BUILD_DB_NAME:-cosmichr_buildtest}"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  agentfield-data:
  workspaces:
