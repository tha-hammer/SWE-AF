services:
  control-plane:
    image: agentfield/control-plane:latest
    ports:
      - "8080:8080"
    environment:
      - AGENTFIELD_HTTP_ADDR=0.0.0.0:8080
      - AGENTFIELD_STORAGE_MODE=local
    volumes:
      - agentfield-data:/data

  swe-agent:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        # Local agentfield SDK (sibling repo) installed over PyPI in the image.
        agentfield_sdk: ../agentfield/sdk/python
    env_file: .env
    environment:
      - AGENTFIELD_SERVER=http://control-plane:8080
      - NODE_ID=swe-planner
      - PORT=8003
      - AGENT_CALLBACK_URL=http://swe-agent:8003
      # Runtime watchdog headroom; build() finalizes at its own budget first.
      - default_execution_timeout=${default_execution_timeout:-21600}
      - SWE_DEFAULT_RUNTIME=${SWE_DEFAULT_RUNTIME:-claude_code}
      - SWE_DEFAULT_MODEL=${SWE_DEFAULT_MODEL:-}
      - SWE_CODEX_AUTH_MODE=${SWE_CODEX_AUTH_MODE:-auto}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "8003:8003"
    volumes:
      - workspaces:/workspaces
      - ${HOME}/.codex:/root/.codex
      # Go port: write target (host path lands output), + read-only references
      - /home/maceo/Dev/goEngineeringPlan:/workspaces/target
      - /home/maceo/Dev/SWE-AF:/workspaces/source-swe-af:ro
      - /home/maceo/Dev/agentfield:/workspaces/agentfield-ref:ro
    depends_on:
      - control-plane
    deploy:
      replicas: 1  # Scale with: docker compose up --scale swe-agent=3

  swe-fast:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        # Local agentfield SDK (sibling repo) installed over PyPI in the image.
        agentfield_sdk: ../agentfield/sdk/python
    command: ["python", "-m", "swe_af.fast"]
    env_file: .env
    environment:
      - AGENTFIELD_SERVER=http://control-plane:8080
      - NODE_ID=swe-fast
      - PORT=8004
      - AGENT_CALLBACK_URL=http://swe-fast:8004
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GH_TOKEN=${GH_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-}
      - SWE_DEFAULT_RUNTIME=${SWE_DEFAULT_RUNTIME:-claude_code}
      - SWE_DEFAULT_MODEL=${SWE_DEFAULT_MODEL:-}
      - SWE_CODEX_AUTH_MODE=${SWE_CODEX_AUTH_MODE:-auto}
    ports:
      - "8004:8004"
    volumes:
      - workspaces:/workspaces
      - ${HOME}/.codex:/root/.codex
    depends_on:
      - control-plane

volumes:
  agentfield-data:
  workspaces:
